<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comet Visualizer</title>
<style>
:root{color-scheme:dark;--bg:#0f1114;--panel:#171b20;--track:#101418;--line:#303944;--text:#f3f5f7;--muted:#a9b1bb;--attack:#f2bf5e;--held:#4dbf87;--release:#5fa8e8;--wave:#77afd4;--play:#ffffff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}
header{position:fixed;left:0;right:0;bottom:0;z-index:20;background:#15191e;border-top:1px solid var(--line);padding:6px 10px;display:grid;gap:6px}
h1{font-size:12px;margin:0;font-weight:650;line-height:1;color:var(--muted)}.toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
button,select,.file-label{height:28px;border:1px solid #3a444f;background:#20262c;color:var(--text);border-radius:5px;padding:0 8px;font:inherit;font-size:12px}
button,.file-label{cursor:pointer}.file-label{display:inline-flex;align-items:center}input[type=file]{display:none}audio{display:none}
.time{font-variant-numeric:tabular-nums;color:var(--muted);font-size:12px}.field{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:11px}.field input[type=range]{width:108px}.field input[type=checkbox]{margin:0}.field input[type=number]{width:58px;border:1px solid #3a444f;background:#101418;color:var(--text);border-radius:4px;padding:2px 4px;font:inherit}
main{padding:0 0 112px;display:grid;gap:0}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{border:0;background:transparent;border-radius:0;padding:0;min-width:auto}.stat b{display:block;font-size:11px}.stat span{display:block;color:var(--muted);font-size:9px;margin-top:1px}
.legend{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:10px}.key{display:flex;align-items:center;gap:5px}.swatch{width:9px;height:9px;border-radius:2px}.attack{background:var(--attack)}.held{background:var(--held)}.release{background:var(--release)}
.viewport{background:#13171c;overflow:auto;height:calc(100vh - 112px)}.timeline{position:relative;min-width:100%;background:#13171c}.ruler,.wave-row,.section-title,.lane{display:grid;grid-template-columns:190px 1fr}.ruler{height:26px;border-bottom:1px solid var(--line);background:#171c22;position:sticky;top:0;z-index:8}.ruler-label,.wave-label,.section-label,.lane-label{border-right:1px solid var(--line);position:sticky;left:0;z-index:5;background:#171c22}.ruler-label{z-index:9}.ruler-scale{position:relative}.tick{position:absolute;top:0;bottom:0;border-left:1px solid #3a4550;font-size:10px;color:var(--muted);padding-left:4px;line-height:25px}
.wave-row{border-bottom:1px solid var(--line);background:#0f1317}.wave-label{padding:6px 8px}.wave-label b,.section-label b,.lane-label b{display:block;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.wave-label span,.section-title span,.lane-label span{display:block;color:var(--muted);font-size:10px;margin-top:1px}.wave-track{position:relative;height:44px;background:#0f1317;cursor:crosshair;overflow:hidden}.wave-canvas{display:block;position:absolute;top:0;height:100%;will-change:transform}
.section-title{min-height:24px;border-bottom:1px solid var(--line);background:#1b2026}.section-label{padding:5px 8px;background:#1b2026}.section-title span{padding:6px 8px;margin:0;font-size:10px}.lane{min-height:32px;border-bottom:1px solid var(--line)}.lane-label{padding:5px 8px;background:#171c22}.lane-track{position:relative;min-height:32px;background:var(--track)}
.event{position:absolute;top:7px;height:16px;border-radius:1px;border-left:1px solid rgba(255,255,255,.35);border-right:1px solid rgba(0,0,0,.35);border-top:1px solid rgba(255,255,255,.12);border-bottom:1px solid rgba(0,0,0,.2);min-width:2px}.event.attack{background:var(--attack)}.event.held{background:var(--held)}.event.release{background:var(--release)}.event.pred{background:#d77f5f}.playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--play);box-shadow:0 0 0 1px #000;pointer-events:none;z-index:10;will-change:transform}.empty{margin:10px;border:1px solid var(--line);background:var(--panel);padding:14px;color:var(--muted)}.error{border-color:#7a3636;background:#251717;color:#f2b3b3}
@media(max-width:780px){main{padding-bottom:150px}.viewport{height:calc(100vh - 150px)}.ruler,.wave-row,.section-title,.lane{grid-template-columns:130px 1fr}.field input[type=range]{width:90px}}
</style>
</head>
<body>
<header>
<h1>Comet Visualizer</h1>
<div class="toolbar">
<label class="file-label">Open Files<input id="fileInput" type="file" multiple accept=".json,.wav,.mp3,.flac,.m4a,.aiff,audio/*,application/json"></label>
<label class="file-label">Open Directory<input id="dirInput" type="file" webkitdirectory multiple></label>
<select id="itemSelect"></select>
<button id="prevButton" type="button" title="Previous item">&lt;</button>
<button id="nextButton" type="button" title="Next item">&gt;</button>
<button id="playButton" type="button" title="Play or pause">Play</button>
<audio id="audio" preload="metadata"></audio>
<span class="time" id="timeReadout">0.000 / 0.000</span>
<label class="field"><input id="follow" type="checkbox" checked> Follow</label>
<label class="field">On <input id="onsetThreshold" type="number" min="0" max="1" step="0.01" value="0.35"></label>
<label class="field">Off <input id="offsetThreshold" type="number" min="0" max="1" step="0.01" value="0.35"></label>
<label class="field">AtkEnd <input id="attackEndThreshold" type="number" min="0" max="1" step="0.01" value="0.25"></label>
<label class="field">RelStart <input id="releaseStartThreshold" type="number" min="0" max="1" step="0.01" value="0.25"></label>
<label class="field">Min <input id="minEventSeconds" type="number" min="0" max="5" step="0.01" value="0.02"></label>
</div>
<section class="stats" id="stats"></section>
<section class="legend"><div class="key"><span class="swatch attack"></span>Attack</div><div class="key"><span class="swatch held"></span>Held</div><div class="key"><span class="swatch release"></span>Release</div></section>
</header>
<main>
<section id="message" class="empty">Open files or a directory to begin.</section>
<section class="viewport" id="viewport" hidden><div class="timeline" id="timeline"></div></section>
</main>
<script>
const fileInput=document.getElementById('fileInput'),dirInput=document.getElementById('dirInput'),itemSelect=document.getElementById('itemSelect');
const prevButton=document.getElementById('prevButton'),nextButton=document.getElementById('nextButton'),playButton=document.getElementById('playButton'),audio=document.getElementById('audio');
const timeReadout=document.getElementById('timeReadout'),follow=document.getElementById('follow');
const onsetThreshold=document.getElementById('onsetThreshold'),offsetThreshold=document.getElementById('offsetThreshold'),attackEndThreshold=document.getElementById('attackEndThreshold'),releaseStartThreshold=document.getElementById('releaseStartThreshold'),minEventSeconds=document.getElementById('minEventSeconds');
const stats=document.getElementById('stats'),message=document.getElementById('message'),viewport=document.getElementById('viewport'),timeline=document.getElementById('timeline');
const labelWidth=190,phaseColors={attack:'var(--attack)',held:'var(--held)',release:'var(--release)'};
let items=[],currentIndex=0,pxPerSec=18,verticalScale=1,playhead=null,rafId=0,currentAudioUrl=null,audioContext=null,waveformCache=null,waveCanvas=null,waveTrack=null,renderQueued=false,waveRenderQueued=false,lastWaveDrawLeft=-99999;
function fmt(value,digits=3){return Number(value||0).toFixed(digits)}
function pathOf(file){return (file.webkitRelativePath||file.name).replaceAll('\\','/')}
function dirname(path){const i=path.lastIndexOf('/');return i>=0?path.slice(0,i):''}
function basename(path){return path.split('/').pop()||path}
function stem(path){return basename(path).replace(/\.[^.]+$/,'')}
function norm(value){return String(value||'').replaceAll('\\','/').toLowerCase()}
function joinPath(base,path){if(!path)return base;if(path.startsWith('/')||/^[a-z]:/i.test(path))return path;const parts=(base?base.split('/'):[]).concat(path.split('/'));const out=[];for(const part of parts){if(!part||part==='.')continue;if(part==='..')out.pop();else out.push(part)}return out.join('/')}
function isAudioPath(path){return /\.(wav|mp3|flac|m4a|aiff|aif)$/i.test(path)}
function isJsonPath(path){return /\.json$/i.test(path)}
function setMessage(text,error=false){message.textContent=text;message.className=error?'empty error':'empty';message.hidden=false}
async function loadFiles(fileList){if(currentAudioUrl){URL.revokeObjectURL(currentAudioUrl);currentAudioUrl=null}waveformCache=null;const files=[...fileList];const byPath=new Map(files.map(file=>[pathOf(file),file]));const jsonRows=[];for(const file of files.filter(file=>isJsonPath(pathOf(file)))){try{jsonRows.push({path:pathOf(file),file,data:JSON.parse(await file.text())})}catch(err){console.warn('Skipping JSON',pathOf(file),err)}}items=buildDataset(jsonRows,byPath).items;currentIndex=0;renderItemOptions();if(!items.length){viewport.hidden=true;setMessage('No generated metadata or prediction JSON files found.',true);return}message.hidden=true;viewport.hidden=false;await loadItem(0)}
function buildDataset(jsonRows,byPath){const groups=new Map();function group(key){key=key||'unknown';if(!groups.has(key))groups.set(key,{key,labels:new Set(),truth:null,pred:null,audio:null,audioPath:null});return groups.get(key)}function audioFileFor(baseDir,candidates){for(const candidate of candidates.filter(Boolean)){const direct=joinPath(baseDir,candidate);const names=[direct,candidate,basename(candidate)];for(const name of names){if(byPath.has(name)&&isAudioPath(name))return {path:name,file:byPath.get(name)}}const suffix=norm(candidate);for(const [path,file] of byPath){if(isAudioPath(path)&&norm(path).endsWith(suffix))return {path,file}}}for(const [path,file] of byPath){if(isAudioPath(path)&&dirname(path)===baseDir)return {path,file}}return null}
for(const row of jsonRows){const data=row.data,baseDir=dirname(row.path);if(data&&Array.isArray(data.sources)&&Array.isArray(data.events)){const clipKey=stem(row.path)==='metadata'?basename(baseDir):stem(row.path);const audioFile=audioFileFor(baseDir,[data.paths&&data.paths.mix,'mix.wav',`audio/${clipKey}.wav`]);const g=group(clipKey);g.truth=data;g.labels.add(clipKey);if(audioFile){g.audio=audioFile.file;g.audioPath=audioFile.path}}else if(data&&Array.isArray(data.slots)&&data.audio){const input=data.audio.input_path||'',viewer=data.audio.viewer_audio_path||'',predKey=basename(baseDir)||stem(input)||stem(row.path);const audioFile=audioFileFor(baseDir,[viewer,input,basename(input)]);const keys=[predKey,stem(input),stem(viewer)].filter(Boolean);let g=null;for(const key of keys){if(groups.has(key)){g=groups.get(key);break}}g=g||group(keys[0]||predKey);g.pred=data;keys.forEach(key=>g.labels.add(key));if(audioFile){g.audio=audioFile.file;g.audioPath=audioFile.path}}}
for(const [path,file] of byPath){if(!isAudioPath(path))continue;const key=stem(path);if(groups.has(key)&&!groups.get(key).audio){groups.get(key).audio=file;groups.get(key).audioPath=path}}return {items:[...groups.values()].map(normalizeGroup).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name))}}
function decodeSettings(){return {onset:clamp01(onsetThreshold.value,.35),offset:clamp01(offsetThreshold.value,.35),attackEnd:clamp01(attackEndThreshold.value,.25),releaseStart:clamp01(releaseStartThreshold.value,.25),minEventSeconds:Math.max(0,Number(minEventSeconds.value)||0)}}
function clamp01(value,fallback){const number=Number(value);return Number.isFinite(number)?Math.max(0,Math.min(1,number)):fallback}
function sectionsFor(truth,pred){const sections=[];if(truth)sections.push({title:'Generated Truth',subtitle:`${truth.eventCount} events`,lanes:truth.lanes});if(pred)sections.push({title:'Predicted Slots',subtitle:`${pred.eventCount||pred.segmentCount} ${pred.eventCount?'events':'segments'}`,lanes:pred.lanes});return sections}
function normalizeGroup(group){const truth=group.truth?truthLanes(group.truth):null,pred=group.pred?predictionLanes(group.pred):null,duration=(pred&&pred.duration)||(truth&&truth.duration)||0,sections=sectionsFor(truth,pred);if(!sections.length)return null;return {name:[...group.labels][0]||group.key,duration,audioFile:group.audio,audioPath:group.audioPath,truth,pred,rawPrediction:group.pred,sections,checkpointEpoch:group.pred&&group.pred.model?group.pred.model.checkpoint_epoch:null}}
function truthLanes(metadata){const eventsBySource=new Map();for(const event of metadata.events){if(!eventsBySource.has(event.source_id))eventsBySource.set(event.source_id,[]);eventsBySource.get(event.source_id).push(event)}const lanes=metadata.sources.map(source=>{const events=eventsBySource.get(source.source_id)||[],segments=[];for(const event of events)segments.push(...eventSegments(event));return {label:`${source.source_id} - ${source.instrument||source.source_type||source.family||''}`,sublabel:`${events.length} events`,segments}});return {lanes,eventCount:metadata.events.length,duration:Number(metadata.duration_seconds||0),phaseTotals:phaseTotals(lanes),activeSeconds:activeSeconds(lanes)}}
function eventSegments(event){const onset=Number(event.onset_seconds),offset=Number(event.offset_seconds),attackEnd=Math.min(offset,onset+Number(event.attack_seconds||0)),releaseStart=Math.max(attackEnd,offset-Number(event.release_seconds||0));const rows=[];if(attackEnd>onset)rows.push({phase:'attack',start:onset,end:attackEnd});if(releaseStart>attackEnd)rows.push({phase:'held',start:attackEnd,end:releaseStart});if(offset>releaseStart)rows.push({phase:'release',start:releaseStart,end:offset});return rows}
function predictionLanes(prediction){const settings=decodeSettings(),duration=Number(prediction.audio&&prediction.audio.duration_seconds||0),frameSeconds=Number(prediction.model&&prediction.model.frame_seconds||0);const lanes=prediction.slots.map(slot=>{const decoded=slot.boundary_probabilities&&frameSeconds?decodeSlotEvents(slot.boundary_probabilities,frameSeconds,duration,settings):null,events=decoded||([]),segments=decoded?events.flatMap(eventToSegments):(Array.isArray(slot.events)&&slot.events.length?slot.events.flatMap(eventToSegments):(slot.segments||[]).map(seg=>({phase:seg.phase,start:Number(seg.start_seconds),end:Number(seg.end_seconds),probability:seg.probability})));return {label:slot.slot,sublabel:`${events.length||segments.length} ${events.length?'events':'segments'} - activity ${fmt(slot.activity_probability)}`,segments,eventCount:events.length}});return {lanes,segmentCount:lanes.reduce((n,lane)=>n+lane.segments.length,0),eventCount:lanes.reduce((n,lane)=>n+lane.eventCount,0),duration,phaseTotals:phaseTotals(lanes),activeSeconds:activeSeconds(lanes),duplicateIou:maxDuplicateIou(lanes,duration),activeSlots:lanes.filter(lane=>lane.segments.length).length}}
function decodeSlotEvents(boundaries,frameSeconds,duration,settings){const onsets=boundaryPeaks(boundaries.onset||[],settings.onset),offsets=boundaryPeaks(boundaries.offset||[],settings.offset),attackEnds=boundaryPeaks(boundaries.attack_end||[],settings.attackEnd),releaseStarts=boundaryPeaks(boundaries.release_start||[],settings.releaseStart),used=new Set(),events=[];for(const onset of onsets){const offset=offsets.find(peak=>peak>onset&&!used.has(peak));if(offset===undefined||((offset-onset)*frameSeconds)<settings.minEventSeconds)continue;used.add(offset);let attackEnd=bestInnerPeak(attackEnds,boundaries.attack_end||[],onset,offset),releaseStart=bestInnerPeak(releaseStarts,boundaries.release_start||[],attackEnd,offset);attackEnd=Math.max(onset,Math.min(attackEnd,offset));releaseStart=Math.max(attackEnd,Math.min(releaseStart,offset));events.push({onset_seconds:Math.max(0,Math.min(duration,onset*frameSeconds)),attack_end_seconds:Math.max(0,Math.min(duration,attackEnd*frameSeconds)),release_start_seconds:Math.max(0,Math.min(duration,releaseStart*frameSeconds)),offset_seconds:Math.max(0,Math.min(duration,offset*frameSeconds)),onset_probability:Number((boundaries.onset||[])[onset]||0),attack_end_probability:Number((boundaries.attack_end||[])[attackEnd]||0),release_start_probability:Number((boundaries.release_start||[])[releaseStart]||0),offset_probability:Number((boundaries.offset||[])[offset]||0),active_probability:0});}return events}
function boundaryPeaks(values,threshold,minDistance=2){const candidates=[];for(let i=0;i<values.length;i++){const value=Number(values[i]||0);if(value<threshold)continue;const left=i>0?Number(values[i-1]||0):-Infinity,right=i+1<values.length?Number(values[i+1]||0):-Infinity;if(value>=left&&value>=right)candidates.push([value,i])}candidates.sort((a,b)=>b[0]-a[0]);const selected=[];for(const [,index] of candidates)if(selected.every(existing=>Math.abs(index-existing)>=minDistance))selected.push(index);return selected.sort((a,b)=>a-b)}
function bestInnerPeak(peaks,values,start,stop){const inner=peaks.filter(peak=>peak>=start&&peak<=stop);if(inner.length)return inner.reduce((best,peak)=>Number(values[peak]||0)>Number(values[best]||0)?peak:best,inner[0]);if(stop<=start)return start;let best=start,bestValue=-Infinity;for(let i=start;i<=stop;i++){const value=Number(values[i]||0);if(value>bestValue){best=i;bestValue=value}}return best}
function eventToSegments(event){const rows=[],onset=Number(event.onset_seconds??event.start_seconds),attackEnd=Number(event.attack_end_seconds??onset),releaseStart=Number(event.release_start_seconds??attackEnd),offset=Number(event.offset_seconds??event.end_seconds);if(attackEnd>onset)rows.push({phase:'attack',start:onset,end:attackEnd,probability:event.onset_probability});if(releaseStart>attackEnd)rows.push({phase:'held',start:attackEnd,end:releaseStart,probability:event.active_probability});if(offset>releaseStart)rows.push({phase:'release',start:releaseStart,end:offset,probability:event.offset_probability});return rows}
function phaseTotals(lanes){const totals={attack:0,held:0,release:0};for(const lane of lanes)for(const seg of lane.segments)if(totals[seg.phase]!==undefined)totals[seg.phase]+=Math.max(0,seg.end-seg.start);return totals}
function activeSeconds(lanes){let total=0;for(const lane of lanes)for(const seg of lane.segments)total+=Math.max(0,seg.end-seg.start);return total}
function maxDuplicateIou(lanes,duration){if(!duration)return 0;const step=.02,bins=Math.max(1,Math.floor(duration/step)+1),masks=[];for(const lane of lanes){const mask=new Uint8Array(bins);for(const seg of lane.segments){for(let i=Math.max(0,Math.floor(seg.start/step));i<Math.min(bins,Math.ceil(seg.end/step));i++)mask[i]=1}if(mask.some(Boolean))masks.push(mask)}let best=0;for(let i=0;i<masks.length;i++)for(let j=i+1;j<masks.length;j++){let inter=0,union=0;for(let k=0;k<bins;k++){inter+=masks[i][k]&masks[j][k];union+=masks[i][k]|masks[j][k]}if(union)best=Math.max(best,inter/union)}return best}
function renderItemOptions(){itemSelect.innerHTML='';items.forEach((item,index)=>{const option=document.createElement('option');option.value=String(index);option.textContent=`${item.name} - ${item.truth?'truth ':''}${item.pred?'prediction ':''}`;itemSelect.appendChild(option)})}
async function loadItem(index){if(!items.length)return;currentIndex=(index+items.length)%items.length;const item=items[currentIndex];itemSelect.value=String(currentIndex);if(currentAudioUrl){URL.revokeObjectURL(currentAudioUrl);currentAudioUrl=null}audio.removeAttribute('src');waveformCache=null;lastWaveDrawLeft=-99999;if(item.audioFile){currentAudioUrl=URL.createObjectURL(item.audioFile);audio.src=currentAudioUrl;decodeWaveform(item.audioFile).then(cache=>{if(items[currentIndex]===item){waveformCache=cache;drawWaveform()}}).catch(err=>console.warn('Waveform decode failed',err))}renderStats(item);renderTimeline(item);updatePlayhead()}
function refreshDecodedPredictions(){for(const item of items){if(!item.rawPrediction)continue;item.pred=predictionLanes(item.rawPrediction);item.sections=sectionsFor(item.truth,item.pred);item.duration=(item.pred&&item.pred.duration)||(item.truth&&item.truth.duration)||item.duration}if(items.length){renderStats(items[currentIndex]);renderTimeline(items[currentIndex])}}
function renderStats(item){const rows=[['Duration',`${fmt(item.duration)}s`],['Mode',`${item.truth?'truth':''}${item.truth&&item.pred?' + ':''}${item.pred?'prediction':''}`],['Epoch',item.checkpointEpoch??'unknown']];if(item.truth)rows.push(['Truth Events',item.truth.eventCount],['Truth Active',`${fmt(item.truth.activeSeconds,1)}s`]);if(item.pred)rows.push(['Pred Events',item.pred.eventCount||0],['Pred Segments',item.pred.segmentCount],['Active Slots',item.pred.activeSlots],['Pred Active',`${fmt(item.pred.activeSeconds,1)}s`],['Active Ratio',item.truth&&item.truth.activeSeconds?`${fmt(item.pred.activeSeconds/item.truth.activeSeconds,2)}x`:'n/a'],['Max Dup IoU',fmt(item.pred.duplicateIou,2)],['Pred A/H/R',`${fmt(item.pred.phaseTotals.attack,1)} / ${fmt(item.pred.phaseTotals.held,1)} / ${fmt(item.pred.phaseTotals.release,1)}`]);stats.innerHTML='';for(const [label,value] of rows){const el=document.createElement('div');el.className='stat';el.innerHTML=`<b>${value}</b><span>${label}</span>`;stats.appendChild(el)}}
async function decodeWaveform(file){audioContext=audioContext||new (window.AudioContext||window.webkitAudioContext)();const buffer=await audioContext.decodeAudioData(await file.arrayBuffer());const channel=buffer.getChannelData(0);const targetBins=Math.min(12000,Math.max(900,Math.ceil(buffer.duration*35)));const samplesPerBin=Math.max(1,Math.floor(channel.length/targetBins));const peaks=[];for(let i=0;i<channel.length;i+=samplesPerBin){let min=1,max=-1,end=Math.min(channel.length,i+samplesPerBin);for(let j=i;j<end;j++){const value=channel[j];if(value<min)min=value;if(value>max)max=value}peaks.push([min,max])}return {duration:buffer.duration,peaks}}
function xFor(seconds){return Math.max(0,seconds*pxPerSec)}
function chooseTickStep(){const target=90/pxPerSec,steps=[.25,.5,1,2,5,10,15,30,60,120,300];return steps.find(step=>step>=target)||300}
function queueRender(){if(renderQueued)return;renderQueued=true;requestAnimationFrame(()=>{renderQueued=false;if(items.length)renderTimeline(items[currentIndex])})}
function queueDrawWaveform(){if(Math.abs(viewport.scrollLeft-lastWaveDrawLeft)<12)return;if(waveRenderQueued)return;waveRenderQueued=true;requestAnimationFrame(()=>{waveRenderQueued=false;drawWaveform()})}
function renderTimeline(item){const duration=Math.max(item.duration,.001),oldLeft=viewport.scrollLeft,oldTop=viewport.scrollTop,contentWidth=Math.max(viewport.clientWidth,Math.ceil(xFor(duration)+labelWidth));timeline.style.width=`${contentWidth}px`;timeline.innerHTML='';renderRuler(duration);renderWaveRow(duration);for(const section of item.sections)renderSection(section,duration);playhead=document.createElement('div');playhead.className='playhead';timeline.appendChild(playhead);viewport.scrollLeft=Math.min(oldLeft,Math.max(0,contentWidth-viewport.clientWidth));viewport.scrollTop=oldTop;updatePlayhead();drawWaveform()}
function renderRuler(duration){const ruler=document.createElement('div');ruler.className='ruler';const label=document.createElement('div');label.className='ruler-label';const scale=document.createElement('div');scale.className='ruler-scale';ruler.append(label,scale);timeline.appendChild(ruler);renderRulerTicks(scale,duration)}
function renderRulerTicks(scale,duration){scale.innerHTML='';const step=chooseTickStep();for(let t=0;t<=duration+.0001;t+=step){const tick=document.createElement('div');tick.className='tick';tick.style.left=`${xFor(t)}px`;tick.textContent=`${t.toFixed(step<1?2:0)}s`;scale.appendChild(tick)}}
function renderWaveRow(){const row=document.createElement('div');row.className='wave-row';const label=document.createElement('div');label.className='wave-label';label.innerHTML='<b>Waveform</b>';waveTrack=document.createElement('div');waveTrack.className='wave-track';waveTrack.style.height=`${Math.round(44*verticalScale)}px`;waveCanvas=document.createElement('canvas');waveCanvas.className='wave-canvas';waveTrack.appendChild(waveCanvas);row.append(label,waveTrack);timeline.appendChild(row)}
function renderSection(section,duration){const title=document.createElement('div');title.className='section-title';const label=document.createElement('div');label.className='section-label';label.innerHTML=`<b>${section.title}</b>`;const sub=document.createElement('span');sub.textContent=section.subtitle;title.append(label,sub);timeline.appendChild(title);for(const lane of section.lanes)renderLane(lane,duration)}
function renderLane(lane){const row=document.createElement('div');row.className='lane';row.style.minHeight=`${Math.round(42*verticalScale)}px`;const label=document.createElement('div');label.className='lane-label';label.innerHTML=`<b>${lane.label}</b><span>${lane.sublabel}</span>`;const track=document.createElement('div');track.className='lane-track';track.style.minHeight=`${Math.round(42*verticalScale)}px`;for(const seg of lane.segments){const block=document.createElement('div');block.className=`event ${phaseColors[seg.phase]?seg.phase:'pred'}`;block.dataset.start=String(seg.start);block.dataset.duration=String(seg.end-seg.start);block.style.top=`${Math.max(6,Math.round(10*verticalScale))}px`;block.style.height=`${Math.max(10,Math.round(20*verticalScale))}px`;block.style.left=`${xFor(seg.start)}px`;block.style.width=`${Math.max(2,xFor(seg.end-seg.start))}px`;block.title=`${seg.phase} ${fmt(seg.start)}-${fmt(seg.end)}${seg.probability!==undefined?` p=${fmt(seg.probability)}`:''}`;track.appendChild(block)}row.append(label,track);timeline.appendChild(row)}
function drawWaveform(){if(!waveCanvas||!waveTrack)return;lastWaveDrawLeft=viewport.scrollLeft;const visibleStart=Math.max(0,viewport.scrollLeft-labelWidth),width=Math.max(1,viewport.clientWidth),height=Math.max(1,waveTrack.clientHeight),dpr=Math.max(1,window.devicePixelRatio||1);waveCanvas.width=Math.round(width*dpr);waveCanvas.height=Math.round(height*dpr);waveCanvas.style.width=`${width}px`;waveCanvas.style.height=`${height}px`;waveCanvas.style.transform=`translateX(${visibleStart}px)`;const ctx=waveCanvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,width,height);ctx.fillStyle='#0f1317';ctx.fillRect(0,0,width,height);ctx.strokeStyle='rgba(255,255,255,.1)';ctx.beginPath();ctx.moveTo(0,height/2);ctx.lineTo(width,height/2);ctx.stroke();if(!waveformCache){ctx.fillStyle='#63707c';ctx.fillText('Decoding waveform...',12,18);return}const peaks=waveformCache.peaks,trackWidth=Math.max(1,xFor(items[currentIndex].duration));ctx.strokeStyle='rgba(119,175,212,.95)';ctx.beginPath();for(let x=0;x<width;x+=2){const absoluteX=visibleStart+x;const bin=Math.max(0,Math.min(peaks.length-1,Math.floor((absoluteX/trackWidth)*peaks.length)));const p=peaks[bin];ctx.moveTo(x,height/2+p[0]*height*.45);ctx.lineTo(x,height/2+p[1]*height*.45)}ctx.stroke()}
function handleTimelineWheel(event){event.preventDefault();if(event.ctrlKey&&event.shiftKey){verticalScale=Math.max(.6,Math.min(2.8,verticalScale*(event.deltaY<0?1.12:1/1.12)));renderTimeline(items[currentIndex])}else if(event.ctrlKey){zoomAround(event.deltaY<0?1.14:1/1.14,event.clientX)}else if(event.shiftKey){viewport.scrollLeft+=event.deltaY}else{viewport.scrollTop+=event.deltaY}}
function zoomAround(factor,clientX){const rect=viewport.getBoundingClientRect(),anchor=(viewport.scrollLeft+clientX-rect.left-labelWidth)/pxPerSec;pxPerSec=Math.max(4,Math.min(180,pxPerSec*factor));refreshHorizontalScale();viewport.scrollLeft=Math.max(0,labelWidth+xFor(anchor)-(clientX-rect.left));updatePlayhead();drawWaveform()}
function refreshHorizontalScale(){if(!items.length)return;const item=items[currentIndex],duration=Math.max(item.duration,.001),contentWidth=Math.max(viewport.clientWidth,Math.ceil(xFor(duration)+labelWidth));timeline.style.width=`${contentWidth}px`;const scale=timeline.querySelector('.ruler-scale');if(scale)renderRulerTicks(scale,duration);for(const block of timeline.querySelectorAll('.event')){const start=Number(block.dataset.start||0),duration=Number(block.dataset.duration||0);block.style.left=`${xFor(start)}px`;block.style.width=`${Math.max(2,xFor(duration))}px`}}
function seekFromTimelineClick(event){if(!items.length||event.target.closest('.lane-label,.wave-label,.section-label,.ruler-label'))return;const rect=viewport.getBoundingClientRect(),relativeX=event.clientX-rect.left;if(relativeX<labelWidth)return;seek((viewport.scrollLeft+relativeX-labelWidth)/pxPerSec,false)}
function seek(seconds,play=false){audio.currentTime=Math.max(0,Math.min(items[currentIndex].duration,seconds));if(play)audio.play();updatePlayhead()}
function updatePlayhead(){const item=items[currentIndex],duration=item?item.duration:0,current=Math.max(0,Math.min(duration,audio.currentTime||0)),absoluteX=labelWidth+xFor(current);timeReadout.textContent=`${fmt(current)} / ${fmt(duration)}`;if(playhead)playhead.style.transform=`translateX(${absoluteX}px)`;if(follow.checked&&!audio.paused){const maxScroll=Math.max(0,timeline.scrollWidth-viewport.clientWidth),target=Math.max(0,Math.min(maxScroll,absoluteX-viewport.clientWidth*.35));viewport.scrollLeft=target}playButton.textContent=audio.paused?'Play':'Pause'}
function animate(){updatePlayhead();rafId=requestAnimationFrame(animate)}
function togglePlayback(){if(!items.length)return;if(audio.paused)audio.play();else audio.pause()}
fileInput.addEventListener('change',event=>loadFiles(event.target.files));dirInput.addEventListener('change',event=>loadFiles(event.target.files));itemSelect.addEventListener('change',event=>loadItem(Number(event.target.value)));prevButton.addEventListener('click',()=>loadItem(currentIndex-1));nextButton.addEventListener('click',()=>loadItem(currentIndex+1));playButton.addEventListener('click',togglePlayback);follow.addEventListener('change',updatePlayhead);viewport.addEventListener('click',seekFromTimelineClick);viewport.addEventListener('wheel',handleTimelineWheel,{passive:false});
for(const control of [onsetThreshold,offsetThreshold,attackEndThreshold,releaseStartThreshold,minEventSeconds])control.addEventListener('input',refreshDecodedPredictions);
audio.addEventListener('play',()=>{cancelAnimationFrame(rafId);animate();playButton.textContent='Pause'});audio.addEventListener('pause',()=>{cancelAnimationFrame(rafId);updatePlayhead()});audio.addEventListener('ended',()=>{cancelAnimationFrame(rafId);updatePlayhead()});audio.addEventListener('timeupdate',updatePlayhead);audio.addEventListener('loadedmetadata',updatePlayhead);viewport.addEventListener('scroll',queueDrawWaveform,{passive:true});window.addEventListener('resize',queueRender);
window.addEventListener('keydown',event=>{const tag=(event.target&&event.target.tagName)||'';if(event.code==='Space'&&!['INPUT','SELECT','TEXTAREA','BUTTON'].includes(tag)){event.preventDefault();togglePlayback()}})
</script>
</body>
